<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PPKPK – Programme Accreditation Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#7c3aed;
  --success:#16a34a;
  --danger:#dc2626;
  --muted:#64748b;
  --bg:#faf7ff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:linear-gradient(180deg,#faf7ff 0%,#f8fafc 60%);
  color:#0f172a;
}

/* ===== TOP ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 24px;
}
.brand{display:flex;gap:12px;align-items:center}
.logo{
  width:42px;height:42px;
  border-radius:12px;
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  color:white;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.brand-sub{font-size:13px;color:var(--muted)}
.btn{
  background:var(--primary);
  color:white;
  padding:10px 18px;
  border-radius:999px;
  font-weight:600;
  text-decoration:none;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:72px 20px 48px;
}
.hero h1{
  font-size:42px;
  margin:0 0 16px;
}
.hero span{color:var(--primary)}
.hero p{
  color:var(--muted);
  max-width:720px;
  margin:auto;
}

/* ===== GRID ===== */
.container{max-width:1300px;margin:auto;padding:24px 20px 80px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
  gap:28px;
}

/* ===== CARD ===== */
.card{
  background:white;
  border-radius:22px;
  padding:24px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
}

/* ===== HEADER ===== */
.card-head{display:flex;justify-content:space-between;gap:16px}
.badge{
  font-size:12px;
  padding:6px 12px;
  border-radius:999px;
  font-weight:600;
}
.ready{background:#e6fff2;color:var(--success)}
.notready{background:#fee2e2;color:var(--danger)}

/* ===== PROGRESS ===== */
.progress{
  width:90px;height:90px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
  margin:16px 0;
  background:#e5e7eb;
}

/* ===== TABS ===== */
.tabs{
  display:flex;
  gap:20px;
  border-bottom:1px solid #e5e7eb;
  margin:16px 0;
}
.tab{
  padding-bottom:8px;
  cursor:pointer;
  font-weight:600;
  color:var(--muted);
}
.tab.active{
  color:var(--primary);
  border-bottom:3px solid var(--primary);
}

.section{display:none}
.section.active{display:block}

/* ===== INFO ===== */
.info{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px 18px;
}
.label{font-size:12px;color:var(--muted)}
.value{font-weight:600}

/* ===== COPPA ===== */
.area{
  border:1px solid #e5e7eb;
  border-radius:14px;
  margin-bottom:12px;
  overflow:hidden;
}
.area-head{
  padding:12px 16px;
  background:#f8fafc;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}
.area-body{display:none;padding:14px}
.area.open .area-body{display:block}

.row{
  display:grid;
  grid-template-columns:70px 1fr 80px 1fr 70px;
  gap:8px;
  padding:8px 0;
  border-bottom:1px dashed #e5e7eb;
  font-size:13px;
}
.row:last-child{border-bottom:none}
.row input{padding:6px;font-size:12px}

.save{
  background:var(--primary);
  color:white;
  border:none;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

/* ===== TABLE ===== */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #e5e7eb;padding:8px}
th{background:#f8fafc}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .hero h1{font-size:30px}
  .grid{grid-template-columns:1fr}
  .info{grid-template-columns:1fr}
  .row{grid-template-columns:60px 1fr}
  .row span:nth-child(3),
  .row input,
  .row button{grid-column:1/-1}
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="brand">
    <div class="logo">P</div>
    <div>
      <div><b>PPKPK</b></div>
      <div class="brand-sub">Programme Accreditation Monitoring</div>
    </div>
  </div>
  <a class="btn">Dashboard</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Monitor <span>programme accreditation</span> progress</h1>
  <p>Centralised dashboard for COPPA / SRR documentation, student status and programme readiness.</p>
</div>

<!-- CONTENT -->
<div class="container">
  <div id="grid" class="grid"></div>
</div>

<script>
/* ================= CONFIG ================= */
const STUDENT_API = "STUDENT_API_URL";
const APPENDIX_API = "APPENDIX_API_URL";

/* ===== NORMALISE ===== */
function norm(s){
  return (s||"").toLowerCase().replace(/\s+/g," ").trim();
}

/* ================= LOAD ================= */
async function loadDashboard(){
  const students = await fetch(STUDENT_API).then(r=>r.json());
  const appendixAll = await fetch(APPENDIX_API).then(r=>r.json());

  const programmes = {};

  students.forEach(r=>{
    const p=r["ACADEMIC PROGRAM"];
    if(!p) return;

    if(!programmes[p]){
      programmes[p]={
        academic:p,
        bm:r["PROGRAM AKADEMIK"],
        mqr:r["NO MQR"],
        centre:r["PEMILIK PROGRAM"],
        nec:r["NEC"],
        ketua:r["KETUA PROGRAM"],
        team:new Set(),
        students:[],
        aktif:0,
        graduan:0,
        appendix:appendixAll.filter(a=>norm(a.PROGRAMS)===norm(p))
      };
    }

    programmes[p].students.push(r);
    if(r["STATUS PENGAJIAN"]==="AKTIF") programmes[p].aktif++;
    if(r["STATUS PENGAJIAN"]==="BERIJAZAH") programmes[p].graduan++;
    if(r["PENYELIA UTAMA"] && r["PENYELIA UTAMA"]!==r["KETUA PROGRAM"])
      programmes[p].team.add(r["PENYELIA UTAMA"]);
  });

  render(programmes);
}

/* ================= RENDER ================= */
function render(programmes){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  Object.values(programmes).forEach(p=>{
    const done=p.appendix.filter(a=>a.STATUS==="COMPLETE").length;
    const percent=Math.round(done/p.appendix.length*100)||0;

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-head">
        <div>
          <h3>${p.academic}</h3>
          <div class="label">${p.bm}</div>
        </div>
        <span class="badge ${p.graduan>0?"ready":"notready"}">
          ${p.graduan>0?"READY":"NOT READY"}
        </span>
      </div>

      <div class="progress"
        style="background:conic-gradient(var(--primary) ${percent}%,#e5e7eb ${percent}%)">
        ${percent}%
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab(this)">Overview</div>
        <div class="tab" onclick="switchTab(this)">COPPA / SRR</div>
        <div class="tab" onclick="switchTab(this)">Students</div>
      </div>

      <div class="section active">
        <div class="info">
          <div><div class="label">MQR</div><div class="value">${p.mqr}</div></div>
          <div><div class="label">Centre</div><div class="value">${p.centre}</div></div>
          <div><div class="label">NEC</div><div class="value">${p.nec}</div></div>
          <div><div class="label">Ketua</div><div class="value">${p.ketua}</div></div>
          <div><div class="label">Aktif</div><div class="value">${p.aktif}</div></div>
          <div><div class="label">Graduan</div><div class="value">${p.graduan}</div></div>
        </div>
      </div>

      <div class="section">${renderCoppa(p.appendix)}</div>
      <div class="section">${renderStudents(p.students)}</div>
    `;
    grid.appendChild(card);
  });
}

/* ================= TABS ================= */
function switchTab(el){
  const card=el.closest(".card");
  card.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  const idx=[...el.parentNode.children].indexOf(el);
  card.querySelectorAll(".section").forEach((s,i)=>s.classList.toggle("active",i===idx));
}

/* ================= COPPA ================= */
function renderCoppa(list){
  if(!list.length){
    return `<p class="label">No COPPA items for this programme.</p>`;
  }
  const g={};
  list.forEach(a=>(g[a.APPENDIX]=g[a.APPENDIX]||[]).push(a));
  return Object.keys(g).map(area=>`
    <div class="area">
      <div class="area-head" onclick="this.parentNode.classList.toggle('open')">
        ${area}
        <span>${g[area].filter(x=>x.STATUS==="COMPLETE").length}/${g[area].length}</span>
      </div>
      <div class="area-body">
        ${g[area].map(a=>`
          <div class="row">
            <b>${a["NO APPENDIX"]}</b>
            <span>${a.ITEM}</span>
            <span>${a.PIC_ROLE}</span>
            <input value="${a.DOC_LINK||""}">
            <button class="save">Save</button>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

/* ================= STUDENTS ================= */
function renderStudents(list){
  return `
    <table>
      <tr><th>No Matrik</th><th>Nama</th><th>Status</th></tr>
      ${list.map(s=>`
        <tr>
          <td>${s["NO MATRIK"]||"-"}</td>
          <td>${s["NAMA PELAJAR"]||"-"}</td>
          <td>${s["STATUS PENGAJIAN"]||"-"}</td>
        </tr>
      `).join("")}
    </table>`;
}

loadDashboard();
</script>

</body>
</html>
