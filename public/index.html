<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PPKPK – Programme Accreditation Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#7c3aed;
  --primary-dark:#5b21b6;
  --success:#16a34a;
  --danger:#dc2626;
  --muted:#64748b;
  --bg:#fafafa;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:linear-gradient(180deg,#faf7ff 0%,#f8fafc 60%);
  color:#0f172a;
}

/* ===== TOP BAR ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 28px;
}
.brand{
  display:flex;
  gap:12px;
  align-items:center;
}
.logo{
  width:42px;height:42px;
  border-radius:12px;
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  color:white;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
}
.brand-title{font-weight:700}
.brand-sub{font-size:13px;color:var(--muted)}
.login{
  background:var(--primary);
  color:white;
  padding:10px 18px;
  border-radius:999px;
  font-weight:600;
  text-decoration:none;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:80px 20px 60px;
}
.hero h1{
  font-size:44px;
  margin:0 0 16px;
}
.hero h1 span{color:var(--primary)}
.hero p{
  font-size:17px;
  color:var(--muted);
  max-width:720px;
  margin:auto;
}

/* ===== GRID ===== */
.container{
  max-width:1300px;
  margin:auto;
  padding:20px 24px 80px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
  gap:28px;
}

/* ===== CARD ===== */
.card{
  background:white;
  border-radius:22px;
  padding:24px;
  box-shadow:
    0 10px 25px rgba(0,0,0,.06),
    0 20px 45px rgba(0,0,0,.04);
  transition:.25s ease;
}
.card:hover{transform:translateY(-4px)}

.card-head{
  display:flex;
  justify-content:space-between;
  gap:16px;
}
.sub{color:var(--muted);font-size:14px}

/* ===== BADGE ===== */
.badge{
  font-size:12px;
  padding:6px 12px;
  border-radius:999px;
  font-weight:600;
}
.ready{background:#e6fff2;color:var(--success)}
.notready{background:#fee2e2;color:var(--danger)}

/* ===== PROGRESS ===== */
.progress{
  width:96px;height:96px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:18px;
  margin:18px 0;
  position:relative;
  background:#e5e7eb;
}
.progress::after{
  content:"Completion";
  position:absolute;
  bottom:-22px;
  font-size:11px;
  color:var(--muted);
}

/* ===== TABS ===== */
.tabs{
  display:flex;
  gap:24px;
  border-bottom:1px solid #e5e7eb;
  margin:18px 0 14px;
}
.tab{
  padding-bottom:8px;
  font-weight:600;
  cursor:pointer;
  color:var(--muted);
}
.tab.active{
  color:var(--primary);
  border-bottom:3px solid var(--primary);
}

/* ===== SECTION ===== */
.section{display:none}
.section.active{display:block}

/* ===== INFO ===== */
.info{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px 20px;
}
.label{font-size:12px;color:var(--muted)}
.value{font-weight:600}

/* ===== COPPA ===== */
.area{
  border:1px solid #e5e7eb;
  border-radius:14px;
  margin-bottom:12px;
  overflow:hidden;
}
.area-head{
  padding:12px 16px;
  background:#f8fafc;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}
.area-body{display:none;padding:14px}
.area.open .area-body{display:block}

.row{
  display:grid;
  grid-template-columns:70px 1fr 80px 1fr 70px;
  gap:8px;
  padding:8px 0;
  border-bottom:1px dashed #e5e7eb;
  font-size:13px;
}
.row:last-child{border-bottom:none}
.row input{padding:6px;font-size:12px}

.save{
  background:var(--primary);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}
.save:disabled{background:#94a3b8}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
th,td{
  border:1px solid #e5e7eb;
  padding:8px;
}
th{background:#f8fafc}

/* ===== MOBILE FIX ===== */
@media (max-width:768px){

  .hero{padding:48px 16px 32px}
  .hero h1{font-size:30px;line-height:1.2}
  .hero p{font-size:15px}

  .grid{grid-template-columns:1fr}

  .card{padding:18px;border-radius:18px}

  .progress{width:80px;height:80px;font-size:16px}

  .tabs{gap:16px;font-size:14px}

  .info{grid-template-columns:1fr}

  .row{
    grid-template-columns:60px 1fr;
  }
  .row span:nth-child(3),
  .row input,
  .row button{
    grid-column:1 / -1;
  }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <div class="logo">P</div>
    <div>
      <div class="brand-title">PPKPK</div>
      <div class="brand-sub">Programme Accreditation Monitoring</div>
    </div>
  </div>
  <a class="login">Dashboard</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Monitor <span>programme accreditation</span> progress</h1>
  <p>
    Centralised dashboard for COPPA / SRR documentation, student status,
    and programme readiness monitoring.
  </p>
</div>

<!-- CONTENT -->
<div class="container">
  <div id="grid" class="grid"></div>
</div>

<script>
/* ================= CONFIG ================= */
const STUDENT_API = "YOUR_STUDENT_API_URL";
const APPENDIX_API = "YOUR_APPENDIX_API_URL";

/* ================= LOAD ================= */
async function loadDashboard(){
  const students = await fetch(STUDENT_API).then(r=>r.json());
  const appendixAll = await fetch(APPENDIX_API).then(r=>r.json());

  const programmes = {};

  students.forEach(r=>{
    const p=r["ACADEMIC PROGRAM"];
    if(!p) return;

    if(!programmes[p]){
      programmes[p]={
        academic:p,
        bm:r["PROGRAM AKADEMIK"],
        mqr:r["NO MQR"],
        centre:r["PEMILIK PROGRAM"],
        nec:r["NEC"],
        ketua:r["KETUA PROGRAM"],
        team:new Set(),
        students:[],
        aktif:0,
        graduan:0,
        appendix:appendixAll.filter(a=>(a.PROGRAMS||"")===p)
      };
    }

    programmes[p].students.push(r);
    if(r["STATUS PENGAJIAN"]==="AKTIF") programmes[p].aktif++;
    if(r["STATUS PENGAJIAN"]==="BERIJAZAH") programmes[p].graduan++;

    if(r["PENYELIA UTAMA"] && r["PENYELIA UTAMA"]!==r["KETUA PROGRAM"])
      programmes[p].team.add(r["PENYELIA UTAMA"]);
  });

  render(programmes);
}

function render(programmes){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  Object.values(programmes).forEach(p=>{
    const done=p.appendix.filter(a=>a.STATUS==="COMPLETE").length;
    const percent=Math.round(done/p.append💯);
  });
}

loadDashboard();
</script>

</body>
</html>
