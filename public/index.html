<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PKTAAB – Programme Accreditation Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#7c3aed;--success:#16a34a;--danger:#dc2626;--muted:#64748b;--border:#e5e7eb;}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,sans-serif;background:#faf7ff;color:#0f172a}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 24px}
.brand{display:flex;gap:12px;align-items:center}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center}
.brand-sub{font-size:13px;color:#64748b}
.btn{background:#7c3aed;color:#fff;padding:10px 18px;border-radius:999px;font-weight:600}
.hero{text-align:center;padding:50px 20px}
.container{max-width:1300px;margin:auto;padding:20px}
.dean-card,.card{background:#fff;border-radius:22px;padding:24px;box-shadow:0 10px 25px rgba(0,0,0,.06)}
.dean-card{margin-bottom:30px}
.dean-grid,.info{display:grid;gap:15px}
.dean-grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.info{grid-template-columns:repeat(2,1fr)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:28px}
.badge{font-size:12px;padding:6px 12px;border-radius:999px;font-weight:600}
.ready{background:#e6fff2;color:#16a34a}.notready{background:#fee2e2;color:#dc2626}
.progress{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;margin:14px 0}
.tabs{display:flex;gap:20px;border-bottom:1px solid #e5e7eb;margin:16px 0}
.tab{padding-bottom:8px;cursor:pointer}
.tab.active{color:#7c3aed;border-bottom:3px solid #7c3aed}
.section{display:none}.section.active{display:block}
.area{border:1px solid #e5e7eb;border-radius:14px;margin-bottom:12px}
.area-head{padding:14px 18px;background:#f8fafc;font-weight:700;display:flex;justify-content:space-between;cursor:pointer}
.area-body{display:none}.area.open .area-body{display:block}
.coppa-row{display:grid;grid-template-columns:80px 1fr 120px 120px;gap:10px;padding:10px 18px;border-top:1px dashed #e5e7eb}
.coppa-role{font-size:12px;background:#f1f5f9;padding:4px 8px;border-radius:999px;text-align:center}
.check-wrap{display:flex;align-items:center;gap:8px}
.save{background:#7c3aed;color:white;padding:10px 12px;border-radius:8px;text-decoration:none}
table{width:100%;border-collapse:collapse} th,td{border:1px solid #e5e7eb;padding:8px}
</style>
</head>
<body>
<div class="topbar"><div class="brand"><div class="logo">PK</div><div><b>PKTAAB</b><div class="brand-sub">Programme Accreditation Monitoring</div></div></div><div class="btn">Dashboard</div></div>
<div class="hero"><h1>Monitor <span style="color:#7c3aed">programme accreditation</span> progress</h1></div>
<div class="container"><div id="dean-summary" class="dean-card"></div><div id="grid" class="grid"></div></div>
<script>
const STUDENT_API="YOUR_STUDENT_API";
const APPENDIX_API="YOUR_APPENDIX_API";
const norm=s=>(s||"").toLowerCase().trim();

async function loadDashboard(){
 const students=await fetch(STUDENT_API).then(r=>r.json());
 const appendixAll=await fetch(APPENDIX_API).then(r=>r.json());
 const programmes={};

 students.forEach(r=>{
   const p=r["ACADEMIC PROGRAM"];
   if(!p) return;

   if(!programmes[p]){
     programmes[p]={
       academic:p,
       bm:r["PROGRAM AKADEMIK"],
       mqr:r["NO MQR"],
       centre:r["PEMILIK PROGRAM"],
       nec:r["NEC"],
       ketua:r["KETUA PROGRAM"],
       folder_link:r["FOLDER_LINK"]||"",
       students:[],
       aktif:0,
       graduan:0,
       appendix:appendixAll.filter(a=>norm(a.PROGRAMS)===norm(p))
     };
   }

   programmes[p].students.push(r);
   if(r["STATUS PENGAJIAN"]==="AKTIF") programmes[p].aktif++;
   if(r["STATUS PENGAJIAN"]==="BERIJAZAH") programmes[p].graduan++;
 });

 renderProgrammes(programmes);
}

function renderProgrammes(programmes){
 const grid=document.getElementById("grid");
 grid.innerHTML="";
 Object.values(programmes).forEach(p=>{
   const done=p.appendix.filter(a=>a.STATUS==="COMPLETE").length;
   const percent=Math.round(done/(p.appendix.length||1)*100);

   const card=document.createElement("div");
   card.className="card";
   card.innerHTML=`
   <h3>${p.academic}</h3>
   <div>${p.bm}</div>
   ${p.folder_link?`<p><a class="save" target="_blank" href="${p.folder_link}">📁 Open Accreditation Folder</a></p>`:''}
   <span class="badge ${p.graduan>0?'ready':'notready'}">${p.graduan>0?'READY':'NOT READY'}</span>
   <div class="progress">${percent}%</div>
   <div class="tabs">
     <div class="tab active" onclick="switchTab(this)">Overview</div>
     <div class="tab" onclick="switchTab(this)">COPPA / SRR</div>
     <div class="tab" onclick="switchTab(this)">Students</div>
   </div>
   <div class="section active">
      <div class="info">
      <div><b>MQR</b><br>${p.mqr}</div>
      <div><b>Centre</b><br>${p.centre}</div>
      <div><b>NEC</b><br>${p.nec}</div>
      <div><b>Programme Head</b><br>${p.ketua}</div>
      </div>
   </div>
   <div class="section">${renderCoppa(p.appendix,p.academic)}</div>
   <div class="section">${renderStudents(p.students)}</div>`;
   grid.appendChild(card);
 });
}

function renderCoppa(list,program){
 return list.map(a=>`
 <div class="coppa-row">
 <div>${a["NO APPENDIX"]}</div>
 <div>${a.ITEM}</div>
 <div class="coppa-role">${a.PIC_ROLE}</div>
 <label class="check-wrap">
 <input type="checkbox" ${a.STATUS==="COMPLETE"?"checked":""}
 onchange="updateStatus('${a["NO APPENDIX"]}','${program}',this.checked)">
 Complete
 </label>
 </div>`).join("");
}

function updateStatus(appendix,program,checked){
 fetch(APPENDIX_API,{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({appendix,program,status:checked?"COMPLETE":"INCOMPLETE"})
 }).then(()=>loadDashboard());
}

function renderStudents(list){
 return `<table><tr><th>No Matrik</th><th>Name</th><th>Status</th></tr>${
 list.map(s=>`<tr><td>${s["NO MATRIK"]||""}</td><td>${s["NAMA PELAJAR"]||""}</td><td>${s["STATUS PENGAJIAN"]||""}</td></tr>`).join("")
 }</table>`;
}

function switchTab(el){
 const card=el.closest(".card");
 card.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 el.classList.add("active");
 const idx=[...el.parentNode.children].indexOf(el);
 card.querySelectorAll(".section").forEach((s,i)=>s.classList.toggle("active",i===idx));
}
</script>
</body></html>
