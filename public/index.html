<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PPKPK – Programme Accreditation Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#7c3aed;
  --success:#16a34a;
  --danger:#dc2626;
  --muted:#64748b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:linear-gradient(180deg,#faf7ff 0%,#f8fafc 60%);
  color:#0f172a;
}

/* ===== TOP BAR ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 24px;
}
.brand{display:flex;gap:12px;align-items:center}
.logo{
  width:42px;height:42px;
  border-radius:12px;
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  color:#fff;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.brand-sub{font-size:13px;color:var(--muted)}
.btn{
  background:var(--primary);
  color:#fff;
  padding:10px 18px;
  border-radius:999px;
  font-weight:600;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:64px 20px 40px;
}
.hero h1{
  font-size:40px;
  margin:0 0 12px;
}
.hero span{color:var(--primary)}
.hero p{
  color:var(--muted);
  max-width:720px;
  margin:auto;
}

/* ===== CONTAINER ===== */
.container{
  max-width:1300px;
  margin:auto;
  padding:20px 20px 80px;
}

/* ===== DEAN SUMMARY ===== */
.dean-card{
  background:linear-gradient(135deg,#ede9fe,#faf5ff);
  border-radius:22px;
  padding:26px;
  margin-bottom:36px;
  box-shadow:0 15px 35px rgba(0,0,0,.08);
}
.dean-title{
  font-weight:700;
  font-size:18px;
  margin-bottom:16px;
}
.dean-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:18px;
}
.dean-box{
  background:#fff;
  border-radius:16px;
  padding:16px;
}
.dean-label{font-size:12px;color:var(--muted)}
.dean-value{font-size:22px;font-weight:700;margin-top:6px}
.good{color:var(--success)}
.bad{color:var(--danger)}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
  gap:28px;
}

/* ===== CARD ===== */
.card{
  background:#fff;
  border-radius:22px;
  padding:24px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
}

/* ===== BADGE ===== */
.badge{
  font-size:12px;
  padding:6px 12px;
  border-radius:999px;
  font-weight:600;
}
.ready{background:#e6fff2;color:var(--success)}
.notready{background:#fee2e2;color:var(--danger)}

/* ===== PROGRESS ===== */
.progress{
  width:90px;height:90px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  margin:14px 0;
  background:#e5e7eb;
}

/* ===== TABS ===== */
.tabs{
  display:flex;
  gap:20px;
  border-bottom:1px solid #e5e7eb;
  margin:16px 0;
}
.tab{
  padding-bottom:8px;
  cursor:pointer;
  font-weight:600;
  color:var(--muted);
}
.tab.active{
  color:var(--primary);
  border-bottom:3px solid var(--primary);
}

.section{display:none}
.section.active{display:block}

/* ===== INFO ===== */
.info{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px 18px;
}
.label{font-size:12px;color:var(--muted)}
.value{font-weight:600}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .hero h1{font-size:30px}
  .grid{grid-template-columns:1fr}
  .info{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <div class="logo">P</div>
    <div>
      <b>PPKPK</b>
      <div class="brand-sub">Programme Accreditation Monitoring</div>
    </div>
  </div>
  <div class="btn">Dashboard</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Monitor <span>programme accreditation</span> progress</h1>
  <p>
    Centralised dashboard for COPPA / SRR documentation,
    student status and programme readiness monitoring.
  </p>
</div>

<div class="container">

  <!-- DEAN SUMMARY -->
  <div id="dean-summary" class="dean-card"></div>

  <!-- PROGRAMMES -->
  <div id="grid" class="grid"></div>
</div>

<script>
/* ================= CONFIG ================= */
const STUDENT_API =
"https://script.google.com/macros/s/AKfycbzveYXbtD0_WdOmaX5pXapE4mBZoT9lsMlLSi7nM8iGyErZ69WjJKRoBre9Wy6MTjXbkg/exec";

const APPENDIX_API =
"https://script.google.com/macros/s/AKfycbyvmcbCmkktJjovaf4sKiF_cuYFEY5oMJwSbBq5Xa3c2Z7vGTb0TetxuECzZ3c6LYBntg/exec";

const norm = s => (s||"").toLowerCase().trim();

/* ================= LOAD ================= */
async function loadDashboard(){
  const students = await fetch(STUDENT_API).then(r=>r.json());
  const appendixAll = await fetch(APPENDIX_API).then(r=>r.json());

  const programmes = {};

  students.forEach(r=>{
    const p = r["ACADEMIC PROGRAM"];
    if(!p) return;

    if(!programmes[p]){
      programmes[p]={
        academic:p,
        bm:r["PROGRAM AKADEMIK"],
        mqr:r["NO MQR"],
        centre:r["PEMILIK PROGRAM"],
        nec:r["NEC"],
        ketua:r["KETUA PROGRAM"],
        students:[],
        aktif:0,
        graduan:0,
        appendix: appendixAll.filter(a=>norm(a.PROGRAMS)===norm(p))
      };
    }

    programmes[p].students.push(r);
    if(r["STATUS PENGAJIAN"]==="AKTIF") programmes[p].aktif++;
    if(r["STATUS PENGAJIAN"]==="BERIJAZAH") programmes[p].graduan++;
  });

  renderDean(programmes);
  renderProgrammes(programmes);
}

/* ===== DEAN SUMMARY ===== */
function renderDean(programmes){
  const list = Object.values(programmes);
  let totalAppendix=0, complete=0, aktif=0, graduan=0;

  list.forEach(p=>{
    aktif+=p.aktif;
    graduan+=p.graduan;
    totalAppendix+=p.appendix.length;
    complete+=p.appendix.filter(a=>a.STATUS==="COMPLETE").length;
  });

  const percent = totalAppendix?Math.round(complete/totalAppendix*100):0;

  document.getElementById("dean-summary").innerHTML=`
    <div class="dean-title">🎓 Dean Overview</div>
    <div class="dean-grid">
      <div class="dean-box"><div class="dean-label">Programmes</div><div class="dean-value">${list.length}</div></div>
      <div class="dean-box"><div class="dean-label">Overall Completion</div><div class="dean-value">${percent}%</div></div>
      <div class="dean-box"><div class="dean-label">COPPA Items</div><div class="dean-value">${complete}/${totalAppendix}</div></div>
      <div class="dean-box"><div class="dean-label">Students</div><div class="dean-value">${aktif} Aktif<br>${graduan} Graduan</div></div>
    </div>
  `;
}

/* ===== PROGRAM CARDS ===== */
function renderProgrammes(programmes){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  Object.values(programmes).forEach(p=>{
    const done=p.appendix.filter(a=>a.STATUS==="COMPLETE").length;
    const percent=Math.round(done/p.appendix.length*100)||0;

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <h3>${p.academic}</h3>
      <div class="label">${p.bm}</div>
      <span class="badge ${p.graduan>0?"ready":"notready"}">${p.graduan>0?"READY":"NOT READY"}</span>

      <div class="progress"
        style="background:conic-gradient(var(--primary) ${percent}%,#e5e7eb ${percent}%)">
        ${percent}%
      </div>

      <div class="info">
        <div><div class="label">MQR</div><div class="value">${p.mqr}</div></div>
        <div><div class="label">Centre</div><div class="value">${p.centre}</div></div>
        <div><div class="label">NEC</div><div class="value">${p.nec}</div></div>
        <div><div class="label">Ketua</div><div class="value">${p.ketua}</div></div>
      </div>
    `;
    grid.appendChild(card);
  });
}

loadDashboard();
</script>

</body>
</html>
